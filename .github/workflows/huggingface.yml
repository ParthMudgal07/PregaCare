name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "parth@example.com"
          git config --global user.name "Parth Mudgal"
          git push --force https://parthmudgal28:$HF_TOKEN@huggingface.co/spaces/parthmudgal28/PregaCare-AI main
